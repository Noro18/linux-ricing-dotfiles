# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER  

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# bind = $mainMod, Q, exec, kitty
bind = $mainMod, RETURN, exec, kitty
# bind = $mainMod, C, killactive,
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, dolphin
# bind = $mainMod, V, togglefloating,
bind = $mainMod, T, togglefloating, 
bind = $mainMod, F, fullscreen
bind = $mainMod, SPACE, exec, pkill rofi || launcher
bind = $mainMod, P, exec, pkill rofi || battery # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, chromium
bind = $mainMod, V, exec, code

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + []
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Switch to previous workspace on current monitor  
bind = SUPER SHIFT, LEFT, workspace, r-1

# Switch to next workspace on current monitor  
bind = SUPER SHIFT, RIGHT, workspace, r+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
# bindm = $mainMod, mouse:273, resizewindow

# Custom keybinds
bind = $mainMod, R, exec, pkill waybar; waybar & # Reload Waybar
bind = $mainMod SHIFT, R, exec, wallset-backend-startup # Reload Wallpaper
bind = $mainMod, W, exec, pkill rofi || wallset # open wallpaper swtiher 
bind = $mainMod SHIFT, S, exec, pkill rofi || ~/.config/rofi/applets/bin/powermenu.sh #Power menu 
bind = $mainMod, L, exec, hyprlock # lock screeni
bind = $mainMod, C, exec, cursor
bind = $mainMod SHIFT, E, exec, rofimoji --action copy
bind = $mainMod SHIFT, W, exec, pkill rofi || waybar-menu

# Eye Comfort
bind = $mainMod, S, exec, toggle-hyprsunset


# Screen shot keybinds
# Screenshot (full)
bind = , Print, exec, grim ~/Pictures/screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "📸 Screenshot saved!" "Saved to ~/Pictures"

# Screenshot (region select)
bind = CTRL, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png && notify-send "📸 Screenshot saved!" "Area captured and saved to ~/Pictures"

# Screenshot (region + edit in Swappy)
bind = ALT, Print, exec, grim -g "$(slurp)" - | swappy -f - && notify-send "🖊 Screenshot edited" "Opened in Swappy"



# Volume control (requires pamixer)
bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

# Brightness control (requires brightnessctl)
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Mouse FIx 

# If you want button 276 instead:
bindm = , mouse:275, mouse:3
