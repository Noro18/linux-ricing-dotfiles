# Thi a example Hyprland config file.
#
# Refer to the wiki for more information.
#
# Please note not all available settings / options are set here.

# For a full list, see the wik
#

# See https://wiki.hyprland.org/Configuring/Monitors/

monitor=,preffered,auto,1


# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = hyprpaper &
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = swww-daemon &
exec-once = setxkbmap -option compose:ralt
exec-once = ~/.config/hypr/scripts/waybar-light-controls/hyprsunset_init.sh
exec-once = hyprsunset & 
exec-once = waybar & nm-applet --indicator & swaync
exec-once = waypaper --restore
exec-once = hypridle
exec-once = battery_monitor &
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets
exec-once = wallset-backend-startup
# exec-once = autostart_kitty
exec-once = sudo input-remmaper-service

# exec-once = /home/noro18/Documents/Project/Echo-Voice\ Assistant/.venv/bin/python3 /home/noro18/Documents/Project/Echo-Voice\ Assistant/src/cli.py --active & # Start Echo Voice Assistant at login





# Source a file (multi-file configs)
source = ~/.config/hypr/colors/colors.conf
source = ~/.config/hypr/workspaces.conf
source=~/.config/hypr/monitors.conf



# Some default env vars.
env = XCURSOR_SIZE,24
env = XDG_MENU_PREFIX,arch-
env = XCURSOR_THEME, breeze
env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORMTHEME,qt6ct

# For KVM virtual machines
env = WLR_NO_HARDWARE_CURSORS, 1
env = WLR_RENDERER_ALLOW_SOFTWARE, 1




# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = compose:ralt
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 4
    gaps_out = 8
    border_size =1
   
    
    col.active_border = $primary $secondary_fixed
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding =8
    active_opacity = 0.95
    inactive_opacity = 0.90
    blur {
        enabled = true
        size =7
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true                   # turn shadows on
        range = 6                        # shadow blur/spread
        render_power = 4               # shadow falloff strength (1–4)
        sharp = false                      # strong edge shadow?
        ignore_window = true               # shadow only around edges
        offset = 0 2                       # x y shadow offset
                              # scale shadow size (float)
        # color = rgba(000000bb)             # color + opacity
        # color_inactive = rgba(00000080)    # optional for unfocused windows
    }
}

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar

windowrule = no_blur on, match:class org.oe-f.openboard
# windowrule = xray on, match:class openboard 



animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
   
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
  
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more

# Example windowrule v1
# windowrule = float, kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
source=~/.config/hypr/configurations/keybinds.conf



