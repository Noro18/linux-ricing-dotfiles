# ╔══════════════════════════════════════╗
# ║        HYPRLAND MAIN CONFIG          ║
# ║   https://wiki.hyprland.org/         ║
# ╚══════════════════════════════════════╝


# ── Monitors ──────────────────────────────────────────────────────────
# monitor = , preferred, auto, 1


# ── Sources ───────────────────────────────────────────────────────────
source = ~/.config/hypr/colors/colors.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/workspaces.conf
source = ~/.config/hypr/configurations/keybinds.conf


# ── Autostart ─────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = /usr/bin/gnome-keyring-daemon --start --components=secrets

exec-once = swww-daemon &
exec-once = waypaper --restore
# exec-once = wallset-backend ~/.config/wallpapers/f.

exec-once = waybar & nm-applet --indicator & swaync
exec-once = hypridle
exec-once = hyprsunset &
exec-once = ~/.config/hypr/scripts/waybar-light-controls/hyprsunset_init.sh

exec-once = setxkbmap -option compose:ralt
exec-once = battery_monitor &
exec-once = sudo input-remapper-service


# ── Environment Variables ─────────────────────────────────────────────
env = XCURSOR_THEME, breeze
env = XCURSOR_SIZE,  24
env = XDG_MENU_PREFIX, arch-
env = QT_QPA_PLATFORMTHEME, qt6ct

# KVM / software rendering fallback
env = WLR_NO_HARDWARE_CURSORS,      1
env = WLR_RENDERER_ALLOW_SOFTWARE,  1


# ── Input ─────────────────────────────────────────────────────────────
input {
    kb_layout  = us
    kb_options = compose:ralt

    follow_mouse = 1
    sensitivity  = 0  # -1.0 to 1.0, 0 = no modification

    touchpad {
        natural_scroll = true
    }
}
monitor = , addreserved, -10, 0, 0, 0

# ── General ───────────────────────────────────────────────────────────
general {
    gaps_in     = 8 0 0 0 
    gaps_out    = 8 16 16 16 
    # border_size = 0

    # col.active_border   = $primary
    # col.inactive_border = rgba(595959aa)

    layout = dwindle
}


# ── Decoration ────────────────────────────────────────────────────────
decoration {
    rounding         = 12
    active_opacity   = 0.95
    inactive_opacity = 0.86

    blur {
        enabled           = true
        size              = 2
        passes            = 3
        new_optimizations = true
    }

    shadow {
        enabled       = true
        range         = 1
        render_power  = 5
        sharp         = false
        ignore_window = true
        offset        = 0 43
    }
}


# ── Animations ────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = overshoot,  0, 1.6, 0.28, 1
    bezier = smooth,     0.4, 0, 0.2, 1       # material-style smooth

    animation = windows,    1, 4, default, slide
    animation = workspaces, 1, 4, default, slidefade 90%
    animation = layersIn,   1, 4, smooth, popin 10%
    animation = layersOut,  1, 3, smooth, popin
}


# ── Layout ────────────────────────────────────────────────────────────
dwindle {
    pseudotile     = true
    preserve_split = true
}

master {
}


# ── Misc ──────────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    vrr = 0
}


# ── Layer Rules ───────────────────────────────────────────────────────
layerrule = blur on,        match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
# layerrule = animation rofi_anim, rofi

bezier = MySmooth, 0.484, 0.039, 0.324, 0.991

animation = layers, 1, 6, MySmooth, slide
layerrule = animation slide right, match:namespace swaync-notification-window
layerrule = animation slide right, match:namespace swaync-control-center

# ── Window Rules ──────────────────────────────────────────────────────
windowrule = no_blur on, match:class org.oe-f.openboard

# ── Window Rules Complex GUI specific toolsbar flickering ──────────────────────────────────────────────────────

windowrule {
    name = android-studio-rule
    match:class = ^(jetbrains-.*|android-studio)$
    match:title = ^(win[0-9]+)$

    float = on
    no_focus = on
    rounding = 20
}
# Newest unified windowrule syntax
windowrule = match:class ^(jetbrains-.*|android-studio)$, match:title ^(win[0-9]+)$, decorate on
windowrule = match:class ^(jetbrains-.*|android-studio)$, match:title ^(win[0-9]+)$, border_size 2
windowrule = match:class ^(jetbrains-.*|android-studio)$, match:title ^(win[0-9]+)$, float on





b = $mainMod SHIFT, P, exec, hyprctl layers > /tmp/layers.txt


# HyprMod managed settings
source = /home/noro18/.config/hypr/hyprland-gui.conf
