# Configuration
font_family                 JetBrainsMono Nerd Font
font_size                   11
bold_font                   auto
italic_font                 auto
bold_italic_font            auto
remember_window_size        no
initial_window_width        950
initial_window_height       500
cursor_blink_interval       0.5
cursor_stop_blinking_after  2
scrollback_lines            2000
wheel_scroll_min_lines      1
window_padding_width        20
hide_window_decorations     yes
background_opacity          1
dynamic_background_opacity  no
confirm_os_window_close     0
selection_foreground        none
scrollbar                   never
selection_background        none
cursor_trail 3
cursor_trail_decay 0.1 0.5
cursor_trail_start_threshold 0
enable_audio_bell yes
visual_bell_duration 0.1
bell_on_tab yes
command_on_bell paplay /usr/share/sounds/freedesktop/stereo/dialog-error.oga


# Animated cursor follows text
# include $HOME/.config/ml4w/settings/kitty-cursor-trail.conf

# Include wallpaper colors


# include ./colors/colors.conf

include ~/.cache/wallust/colors-kitty.conf

# Include Custom Configuration
# Create the file custom.conf in ~/.config/kitty to overwrite the default configuration
