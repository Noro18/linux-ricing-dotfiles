"$schema" = 'https://starship.rs/config-schema.json'

format = '''
[‚ĖĎ‚Ėí‚Ėď](color1)[ůį£á](fg:#090c0c bg:color1)$username[Óāī](bg:color6 fg:color1)$directory[Óāī](fg:color11 bg:color6)$git_branch$git_status[Óāī](fg:color6 bg:color6)$nodejs$rust$golang$php[Óāī](fg:color6 bg:color12)$conda[Óāį ](fg:color12)$line_break$character'''

palette = 'colors'

[palettes.colors]
mustard = '#af8700' # example
color1 = '#d9bafa'
color2 = '#3d2459'
color3 = '#ccc4cf'
color4 = '#221e24'
color5 = '#3d2459'
color6 = '#3d2459'
color7 = '#151218'
color8 = '#d9bafa'
color9 = '#f2b7c0'
color10 = '#270d43'
color11 = '#543b72'
color12 = '#362d40'


[username]
show_always = true
style_user = "fg:#090c0c bg:color1 "
style_root = "fg:#090c0c bg:color1 "
format = "[ $user ]($style)"
disabled = false


[directory]
style = "fg:color3 bg:color11"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ÔÄĀ "
"Pictures" = "ÔÄĺ "

[git_branch]
symbol = "Ôźė"
style = "bg:color6"
format = '[[ $symbol $branch ](fg:color1 bg:color6)]($style)'

[git_status]
style = "bg:color6"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:color6)]($style)'

[nodejs]
symbol = "Óúė"
style = "bg:color11"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:color11)]($style)'

[rust]
symbol = "Óě®"
style = "bg:color11"
